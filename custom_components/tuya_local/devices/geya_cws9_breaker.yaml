name: Geya GWS9 Breaker
products:
  - id: bf7f59da68863b53b5p9aa
entities:
  - entity: switch
    icon: "mdi:fuse"
    dps:
      - id: 16
        name: switch
        type: boolean
  - entity: sensor
    name: Voltage
    class: voltage
    dps:
      - id: 102
        name: sensor
        type: integer
        unit: V
        class: measurement
        mapping:
          - scale: 10
  - entity: sensor
    name: Current
    class: current
    dps:
      - id: 106
        name: sensor
        type: integer
        unit: A
        class: measurement
        mapping:
          - scale: 1000
  - entity: sensor
    name: Power
    class: power
    dps:
      - id: 110
        name: sensor
        type: integer
        unit: W
        class: measurement
  - entity: sensor
    name: Temperature
    class: temperature
    dps:
      - id: 114
        name: sensor
        type: integer
        unit: °C
        class: measurement
        mapping:
          - scale: 10
  - entity: button
    name: Refresh Data
    class: update
    category: diagnostic
    dps:
      - id: 197
        type: boolean
        name: button
        optional: true
